spring.application.name=dockerdeployment
# Production database configuration

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/dockerUser?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_DATABASE:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:verysecret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JPA configuration

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# Actuator endpoints (optional)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
server.port=${SERVERPORT:8081}