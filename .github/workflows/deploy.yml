# Name of the workflow - appears in GitHub Actions tab
name: Deploy to AWS

# TRIGGER SECTION - When this workflow should run
on:
  push:                    # Trigger on code push
    branches: ["main"]     # Only when pushing to 'main' branch

# JOBS SECTION - What tasks to perform
jobs:
  deploy:                  # Name of the job
    # The type of machine to run the job on (GitHub's Linux server)
    runs-on: ubuntu-latest

    # STEPS SECTION - Individual tasks to execute
    steps:
      # STEP 1: Download your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3    # Official GitHub action to get your code

      # STEP 2: Install Java 17 (matches your Dockerfile's eclipse-temurin)
      - name: Set up JDK 17
        uses: actions/setup-java@v3   # Official Java setup action
        with:
          java-version: '17'           # Use Java version 17
          distribution: 'temurin'      # Eclipse Temurin distribution (matches your Dockerfile)

      # STEP 3: Compile your Java code and create JAR file
      - name: Build with Maven
        run: |
          chmod +x mvnw                # Make Maven wrapper executable
          ./mvnw clean package -DskipTests  # Build JAR without running tests

      # STEP 4: Log in to Docker Hub using credentials stored in GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2   # Official Docker login action
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # Your Docker Hub username (abhisingh876)
          password: ${{ secrets.DOCKER_PASSWORD }}  # Your Docker Hub password

      # STEP 5: Build Docker image and push to Docker Hub
      - name: Build and push Docker image
        run: |
          # Build Docker image using your Dockerfile
          # -t flag gives it a tag/name
          docker build -t abhisingh876/besicrest:latest .
          
          # Upload the image to Docker Hub registry
          docker push abhisingh876/besicrest:latest

      # STEP 6: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}  # Fixed: 'aws_regin' → 'aws-region'

      # STEP 7: Deploy to AWS by refreshing Auto Scaling Group
      - name: Deploy to AWS by refreshing
        run: |  # Fixed: Added pipe (|) for multi-line command
          aws autoscaling start-instance-refresh \
          --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
          --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}'  # Fixed: 'MinHeathyPrecentage' → 'MinHealthyPercentage'
      # STEP 3: Compile your Java code and create JAR file
      - name: Build with Maven
        run: |
          # Check if maven wrapper exists
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
            ./mvnw clean package -DskipTests
          else
            # Use system maven if available
            mvn clean package -DskipTests
          fi